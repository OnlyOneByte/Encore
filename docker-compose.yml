# Encore — one container for the MVP. The worker is gated behind the `stems` profile,
# so `docker compose up` runs ONLY core until you opt into stem-separation.
#   MVP:        docker compose up
#   With stems: docker compose --profile stems up
# Container hardening (Finding #4): no-new-privileges + cap_drop ALL on every service. The app
# is a plain HTTP/WS server that needs no Linux capabilities; dropping them shrinks the blast
# radius of any RCE. Runs as non-root `bun` (see Dockerfile USER).
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  core:
    <<: *hardening
    build:
      context: . # repo root — the Dockerfile copies packages/shared + apps/core
      dockerfile: apps/core/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MEDIA_STORE=local
    volumes:
      - ./data:/app/data # sqlite (WAL)
      - ./media:/app/media # library + cache + (later) stems
    restart: unless-stopped

  worker:
    <<: *hardening
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    profiles: ["stems"] # not started in the default MVP up
    environment:
      - ENCORE_CORE_WS=ws://core:3000/ws?role=worker
      - ENCORE_WORKER_CONCURRENCY=1
    volumes:
      - ./media:/app/media # shares the local MediaStore volume (single-box mode)
    depends_on:
      - core
    restart: unless-stopped
    # deploy.resources.reservations.devices for GPU added when stems land
